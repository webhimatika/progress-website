<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Component Tabs Page</title>
    <style>
      /* COPY STYLE KE STYLE PAGE UTAMA!!! */

      /* PAGINATION START DEKSTOP */
      .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 3rem;
        font-family: "Montserrat";
        font-size: 1rem;
        color: #39a2db;
        font-weight: 600;
      }
      .pagination .prev-btn,
      .pagination .next-btn,
      .pagination .page-tabs .tab {
        cursor: pointer;
      }
      .pagination .page-tabs {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        font-size: 1rem;
        font-family: "calibri";
        font-weight: 600;
        line-height: 1.7rem;
        color: #000000;
      }
      .pagination .page-tabs .active-tab {
        color: #fff;
        text-align: center;
        background-color: #39a2db;
        border-radius: 10%;
        height: 1.7rem;
        width: 1.7rem;
      }
      /* PAGINATION END DEKSTOP */

      @media (max-width: 1000px) {
        /* PAGINATION START TABLET */
        .pagination {
          gap: 2.2rem;
          font-size: 1.9rem;
        }
        .pagination .page-tabs {
          gap: 2.4rem;
          font-size: 1.9rem;
          line-height: 2.7rem;
        }
        .pagination .page-tabs .active {
          height: 2.7rem;
          width: 2.7rem;
        }
        /* PAGINATION END DEKSTOP */
      }

      @media (max-width: 450px) {
        /* PAGINATION START ANDROID */
        .pagination {
          gap: 2rem;
          font-size: 1.7rem;
        }
        .pagination .page-tabs {
          gap: 2.2rem;
          font-size: 1.7rem;
          line-height: 2.5rem;
        }
        .pagination .page-tabs .active {
          height: 2.5rem;
          width: 2.5rem;
        }
      }
      /* PAGINATION END ANDROID */
    </style>
  </head>
  <body>
    <!-- pagination -->
    <div class="pagination">
      <p class="prev-btn">Prev</p>
      <div class="page-tabs"></div>
      <p class="next-btn">Next</p>
    </div>
    <!-- pagination End-->

    <!-- script -->
    <script src="script/script-tabs.js"></script>
  </body>
</html>
